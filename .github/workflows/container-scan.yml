name: Container Image Scan

on:
  push:
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "src/**"
  pull_request:
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "src/**"
  schedule:
    # Weekly scan every Monday 02:00 UTC — catches newly published CVEs
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write  # Required to upload SARIF to GitHub Security tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t cyberguard-scan:${{ github.sha }} .

      - name: Trivy — scan for CRITICAL and HIGH CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "cyberguard-scan:${{ github.sha }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"        # Fail the job if CRITICAL/HIGH found
          ignore-unfixed: true  # Skip CVEs without an available fix

      - name: Upload SARIF to GitHub Security tab
        if: always()            # Upload even if scan step fails
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
